name: ci-cd-pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  # ─── 1. TEST ────────────────────────────────────────────────────────────────
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 1

  # ─── 2. SONARCLOUD SAST ─────────────────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for blame/new-code analysis

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─── 3. DEPLOY TO PRODUCTION (push to main only) ────────────────────────────
  deploy:
    name: Deploy to Vercel (production)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      deployment_url: ${{ steps.prod_deploy.outputs.deployment_url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > .vercel/project.json

      - name: Deploy to production
        id: prod_deploy
        run: |
          url=$(vercel deploy --prod --yes)
          echo "deployment_url=$url" >> $GITHUB_OUTPUT

  # ─── 4. PREVIEW DEPLOY (pull requests only) ─────────────────────────────────
  preview:
    name: Preview Deploy (PR)
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.preview_deploy.outputs.preview_url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > .vercel/project.json

      - name: Deploy preview
        id: preview_deploy
        run: |
          url=$(vercel deploy --yes)
          echo "preview_url=$url" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed: ${{ steps.preview_deploy.outputs.preview_url }}`
            })

  # ─── 5. ZAP DAST — PRODUCTION ───────────────────────────────────────────────
  zap_production:
    name: OWASP ZAP (production)
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ needs.deploy.outputs.deployment_url }}
          rules_file_name: .zap/rules.tsv
          fail_action: false
          artifact_name: zap-report-production

  # ─── 6. ZAP DAST — PREVIEW ──────────────────────────────────────────────────
  zap_preview:
    name: OWASP ZAP (preview)
    needs: preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        id: zap_scan
        with:
          target: ${{ needs.preview.outputs.preview_url }}
          rules_file_name: .zap/rules.tsv
          fail_action: false
          artifact_name: zap-report-preview

      - name: Comment ZAP results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔐 OWASP ZAP baseline scan complete. Download the full report from the [Actions artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).`
            })
